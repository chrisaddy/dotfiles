# ~/.tmux.conf — portable tmux configuration
#
# Reconstructed from a Nix Home Manager (programs.tmux) setup so it can be
# dropped onto any machine without Nix. Developed against tmux 3.6; needs 3.2+
# (for `extended-keys`). Install with:
#
#     cp tmux.conf ~/.tmux.conf      # then start tmux, or: tmux source-file ~/.tmux.conf
#
# Optional external tools (only the `prefix + o` session picker needs them):
#   - sesh   smart session manager   https://github.com/joshmedeski/sesh
#   - gum    interactive fuzzy UI     https://github.com/charmbracelet/gum
# Everything else is pure tmux and works standalone.

# ── General ────────────────────────────────────────────────────────────────
set  -g  default-terminal "tmux-256color"
set  -ga terminal-overrides ",*256col*:Tc"                  # truecolor (24-bit)
set  -ga terminal-overrides ",*:Ss=\\E[%p1%d q:Se=\\E[2 q"  # cursor shape control
set  -g  allow-passthrough on                               # let apps emit raw escapes
set  -g  set-clipboard on                                   # OSC 52 system clipboard

set  -g  base-index 1                                       # windows start at 1
setw -g  pane-base-index 1                                  # panes start at 1
set  -g  renumber-windows on                                # keep window numbers gapless

set  -g  history-limit 50000
set  -s  escape-time 0                                      # no esc delay (vim-friendly)
set  -g  mouse on
set  -g  focus-events on                                    # vim/neovim :autoread, etc.
set  -g  extended-keys on                                   # report modified keys (CSI u)
setw -g  aggressive-resize off
set  -g  clock-mode-style 24                                # 24-hour clock
set  -g  detach-on-destroy off                              # switch sessions instead of detaching

# Vi-style keys
setw -g  mode-keys vi                                       # copy-mode movement
set  -g  status-keys vi                                     # command prompt editing

# Activity monitoring
setw -g  monitor-activity on
set  -g  visual-activity off

# ── Prefix (C-Space) ─────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix                                    # prefix + C-Space → send literal C-Space
bind C-a     send-prefix                                    # prefix + C-a     → send literal C-Space

# ── Reload ───────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ── Panes ──────────────────────────────────────────────────────────────────
# Split, keeping the current working directory
bind / split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation (no prefix)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes (repeatable: hold the key after prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ──────────────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"                 # new window in current dir
bind l next-window
bind h last-window
bind-key w command-prompt -I "#S" "rename-window '%%'"

# ── Sessions ───────────────────────────────────────────────────────────────
bind Space   choose-session
bind n       command-prompt "new-session -s '%%'"
bind-key R   command-prompt -I "#S" "rename-session '%%'"
# Fuzzy session switcher in a popup (requires `sesh` and `gum` on PATH)
bind-key o display-popup -E -w 40% "sesh connect \"$(
  sesh list -i | gum filter --limit 1 --no-sort --fuzzy --placeholder 'Pick a sesh' --height 50 --prompt='⚡'
)\""

# ── Copy mode (vi) ───────────────────────────────────────────────────────────
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# ── Status bar (Catppuccin Mocha palette) ────────────────────────────────────
set  -g  status-position top
set  -g  status-style "bg=#1e1e2e,fg=#cdd6f4"
set  -g  status-left-length 30
set  -g  status-left "#[fg=#89b4fa,bold] #S #[default]"
set  -g  status-right-length 50
set  -g  status-right "#[fg=#6c7086]%Y-%m-%d %H:%M #[default]"
setw -g  window-status-format " #I:#W "
setw -g  window-status-current-format "#[fg=#f5c2e7,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ── Local, machine-specific overrides ────────────────────────────────────────
if-shell "test -f ~/.tmux.conf.local" "source-file ~/.tmux.conf.local"
